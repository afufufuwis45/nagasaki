<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行しおり</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  overflow: hidden;
  font-family: "Hiragino Mincho ProN", serif;
}

.spiral-wrap {
  perspective: 1000px;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.spiral {
  position: relative;
  transform-style: preserve-3d;
}

.spiral-item {
  position: absolute;
  width: 160px;
  height: 220px;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.spiral-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="spiral-wrap">
  <div class="spiral">

    <!-- ===== 1日目 ===== -->
    <a href="days/day1.html" class="spiral-item"><img src="images/day1_card.jpg"></a>
    <a href="spots/day1_1.html" class="spiral-item"><img src="images/day1_1.jpg"></a>
    <a href="spots/day1_2.html" class="spiral-item"><img src="images/day1_2.jpg"></a>
    <a href="spots/day1_3.html" class="spiral-item"><img src="images/day1_3.jpg"></a>
    <a href="spots/day1_4.html" class="spiral-item"><img src="images/day1_4.jpg"></a>

    <!-- ===== 2日目 ===== -->
    <a href="days/day2.html" class="spiral-item"><img src="images/day2_card.jpg"></a>
    <a href="spots/day2_1.html" class="spiral-item"><img src="images/day2_1.jpg"></a>
    <a href="spots/day2_2.html" class="spiral-item"><img src="images/day2_2.jpg"></a>
    <a href="spots/day2_3.html" class="spiral-item"><img src="images/day2_3.jpg"></a>
    <a href="spots/day2_4.html" class="spiral-item"><img src="images/day2_4.jpg"></a>

    <!-- ===== 3日目 ===== -->
    <a href="days/day3.html" class="spiral-item"><img src="images/day3_card.jpg"></a>
    <a href="spots/day3_1.html" class="spiral-item"><img src="images/day3_1.jpg"></a>
    <a href="spots/day3_2.html" class="spiral-item"><img src="images/day3_2.jpg"></a>
    <a href="spots/day3_3.html" class="spiral-item"><img src="images/day3_3.jpg"></a>
    <a href="spots/day3_4.html" class="spiral-item"><img src="images/day3_4.jpg"></a>

    <!-- ===== 4日目 ===== -->
    <a href="days/day4.html" class="spiral-item"><img src="images/day4_card.jpg"></a>
    <a href="spots/day4_1.html" class="spiral-item"><img src="images/day4_1.jpg"></a>
    <a href="spots/day4_2.html" class="spiral-item"><img src="images/day4_2.jpg"></a>
    <a href="spots/day4_3.html" class="spiral-item"><img src="images/day4_3.jpg"></a>
    <a href="spots/day4_4.html" class="spiral-item"><img src="images/day4_4.jpg"></a>

  </div>
</div>

<script>
(function(){
  const spiral = document.querySelector('.spiral');
  const items = [...document.querySelectorAll('.spiral-item')];

  const radius = 220;
  const yStep = 55;
  const turnDeg = 42;

  let rot = 0;

  function layout(){
    const centerIndex = (items.length - 1) / 2;

    items.forEach((el, i) => {
      const angle = i * turnDeg;
      const y = (i - centerIndex) * yStep;

      el.style.transform =
        `rotateY(${angle}deg) translateZ(${radius}px) translateY(${y}px)`;
    });
  }

  function animate(){
    rot += 0.05;
    spiral.style.transform =
      `translateZ(-260px) rotateY(${rot}deg)`;

    requestAnimationFrame(animate);
  }

  layout();
  animate();
})();
</script>

</body>
</html>
